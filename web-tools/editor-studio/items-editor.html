<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Предметы • tw_items_list</title>
  <script src="editor-core/page-loader.js" data-mode="event"></script>

  <style>
    .items-form [data-field-path="Comment"],
    .items-form [data-field-path="DataEditorType"],
    .items-form [data-field-path="DataRandomBoxItems"],
    .items-form [data-field-path="DataBonusAmount"],
    .items-form [data-field-path="DataBonusType"],
    .items-form [data-field-path="DataBonusDurationValue"],
    .items-form [data-field-path="DataBonusDurationUnit"],
    .items-form [data-field-path="DataPotionEffect"],
    .items-form [data-field-path="DataPotionValue"],
    .items-form [data-field-path="DataPotionLifetime"],
    .items-form [data-field-path="DataPotionRecast"]{
      grid-column: 1 / -1;
    }
  </style>
</head>

<body class="editor-theme" data-editor="items">
  <div class="editor-page">
    <div class="editor-page-header">
      <div class="editor-page-title">
        <i class="fa-solid fa-cube text-accent text-xl"></i>
        <div>
          <h1>Предметы</h1>
          <div class="editor-page-sub">Каталог предметов: параметры, описания и группировка.</div>
        </div>
      </div>
      <div class="editor-page-actions">
        <button class="editor-btn editor-btn-secondary" data-editor-role="refresh">
          <i class="fa-solid fa-rotate"></i><span>Обновить</span>
        </button>
        <button class="editor-btn editor-btn-primary" data-editor-role="new">
          <i class="fa-solid fa-plus"></i><span>Новый предмет</span>
        </button>
      </div>
    </div>

    <div class="editor-shell editor-shell--docked">
      <!-- Sidebar -->
      <aside class="editor-sidebar editor-dock-sidebar">
        <div class="editor-dock-pad">
          <div class="flex items-center justify-between gap-3">
            <div>
              <div class="text-sm font-semibold">Список предметов</div>
              <div class="text-xs editor-muted-text">Всего: <span data-editor-role="count">—</span></div>
            </div>
          </div>

          <div class="mt-3">
            <div class="editor-search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input data-editor-role="search" type="search" class="w-full editor-input form-input" placeholder="Поиск по ID/названию/группе…" />
            </div>
          </div>

          <div class="mt-3 editor-sidebar-filters two-col">
            <select id="filterGroup" class="w-full editor-input form-input">
              <option value="">Все группы</option>
            </select>
            <select id="filterType" class="w-full editor-input form-input">
              <option value="">Все типы</option>
            </select>
          </div>

          <div class="mt-4 editor-sidebar-list editor-scroll" style="max-height: 590px" data-editor-role="list"></div>
        </div>
      </aside>

      <!-- Main -->
      <section class="editor-main editor-dock-main">
        <div class="editor-dock-pad">
          <div class="editor-sticky-toolbar flex items-start justify-between gap-4">
            <div>
              <div class="text-lg font-semibold" data-editor-role="title">Выберите предмет</div>
              <div class="editor-muted-text text-sm mt-1" data-editor-role="subtitle">или создайте новый</div>
            </div>
            <div class="editor-page-actions">
              <span id="dirty-pill" class="editor-dirty-pill hidden">Данные не сохранены</span>
              <button class="editor-btn editor-btn-primary" data-editor-role="save" disabled>
                <i class="fa-solid fa-floppy-disk"></i><span>Сохранить</span>
              </button>
              <button class="editor-btn editor-btn-secondary hidden" data-editor-role="cancel" disabled>
                <i class="fa-solid fa-rotate-left"></i><span>Отменить</span>
              </button>
              <button class="editor-btn editor-btn-secondary" data-editor-role="delete" disabled>
                <i class="fa-solid fa-trash"></i><span>Удалить</span>
              </button>
            </div>
          </div>

          <div class="editor-section mt-4">
            <div class="editor-form-grid-2 items-form" data-editor-role="form"></div>
          </div>

          <div class="editor-muted-text text-xs mt-2">
            Поле <code>Data</code> формируется автоматически на основе выбранного типа Data-редактора
            (если тип не выбран, будет сохранено <code>null</code>).
          </div>

          <div class="mt-4" data-editor-role="status"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const { fieldRenderOptions } = window.EditorCoreBootstrap || EditorCore.bootstrapEditor({ mode: 'event' });

    const GROUPS = [
      'Other',
      'Usable',
      'Resource',
      'Quest',
      'Settings',
      'Equipment',
      'Decoration',
      'Potion',
      'Currency',
    ];

    const TYPE_RULES = (() => {
      const resource = [
        'Default',
        'Resource harvestable',
        'Resource mineable',
        'Resource fishes',
      ];

      const usable = [
        'Single use x1',
        'Multiple use x99',
      ];

      const equipment = [
        'Default',
        'Equip hammer',
        'Equip gun',
        'Equip shotgun',
        'Equip grenade',
        'Equip rifle',
        'Equip pickaxe',
        'Equip rake',
        'Equip fishrod',
        'Equip gloves',
        'Equip armor (tank)',
        'Equip armor (dps)',
        'Equip armor (healer)',
        'Equip helmet (tank)',
        'Equip helmet (dps)',
        'Equip helmet (healer)',
        'Equip eidolon',
        'Equip title',
      ];

      const potion = [
        'Equip potion HP',
        'Equip potion MP',
      ];

      return {
        resource,
        usable,
        equipment,
        potion,
      };
    })();

    // ------------------------------------------------------------
    // group -> type rules (shared util)
    // ------------------------------------------------------------

    const TypeRule = window.EditorCore?.DependentSelect?.create({
      dependsOnPath: 'Group',
      valuePath: 'Type',
      defaultValue: 'Default',
      hideWhen: ['Currency', 'Quest', 'Settings', 'Decoration', 'Other'],
      allowAllWhenMissing: false,
      mapping: {
        Resource: TYPE_RULES.resource,
        Usable: TYPE_RULES.usable,
        Equipment: TYPE_RULES.equipment,
        Potion: TYPE_RULES.potion,
      },
    });

    // sidebar + default selector options
    const TYPES_ALL = Array.from(new Set([
      ...TYPE_RULES.resource,
      ...TYPE_RULES.usable,
      ...TYPE_RULES.equipment,
      ...TYPE_RULES.potion,
      'Default',
    ]));


    const FLAGS = ["Can't droppable", "Can't tradeable"];

    const parseSet = (value, allowed = []) => {
      if (!value) return [];
      const list = Array.isArray(value)
        ? value.map(v => String(v).trim()).filter(Boolean)
        : String(value)
          .split(',')
          .map(v => v.trim())
          .filter(Boolean);

      if (!allowed.length) return list;
      const map = new Map(allowed.map(v => [String(v).toLowerCase(), String(v)]));
      return list.map(v => map.get(String(v).toLowerCase()) || v);
    };

    const joinSet = (value) => {
      const list = Array.isArray(value) ? value.map(v => String(v).trim()).filter(Boolean) : [];
      return list.length ? list.join(',') : null;
    };

    const toNullableInt = (value) => {
      if (value === null || value === undefined || value === '') return null;
      const num = Number(value);
      if (!Number.isFinite(num)) return null;
      return Math.trunc(num);
    };

    const toNullableId = (value) => {
      const num = toNullableInt(value);
      if (!num || num <= 0) return null;
      return num;
    };

    const toJsonPayload = (value, label) => {
      if (value === null || value === undefined) return null;
      if (typeof value === 'object') return value;
      const raw = String(value).trim();
      if (!raw) return null;
      try {
        return JSON.parse(raw);
      } catch (err) {
        throw new Error(`Поле ${label}: неверный JSON`);
      }
    };

    const safeToJsonPayload = (value) => {
      try {
        return toJsonPayload(value, 'Data');
      } catch (err) {
        return null;
      }
    };

    const DATA_EDITOR_NONE = 'none';
    const DATA_EDITOR_RANDOM_BOX = 'random_box';
    const DATA_EDITOR_BONUS = 'bonus';
    const DATA_EDITOR_POTION = 'potion';
    const DATA_EDITOR_USE_SCENARIO = 'use_scenario';

    const DATA_EDITOR_RULES = {
      Usable: [
        { value: DATA_EDITOR_NONE, label: 'Без данных' },
        { value: DATA_EDITOR_RANDOM_BOX, label: 'Рандом Бокс' },
        { value: DATA_EDITOR_BONUS, label: 'Бонус' },
        { value: DATA_EDITOR_USE_SCENARIO, label: 'Запуск сценария' },
      ],
      Potion: [
        { value: DATA_EDITOR_NONE, label: 'Без данных' },
        { value: DATA_EDITOR_POTION, label: 'Зелье' },
      ],
    };

    const BONUS_TYPES = [
      { value: 1, label: 'Опыт (BONUS_TYPE_EXPERIENCE)' },
      { value: 2, label: 'Золото (BONUS_TYPE_GOLD)' },
      { value: 3, label: 'HP (BONUS_TYPE_HP)' },
      { value: 4, label: 'MP (BONUS_TYPE_MP)' },
    ];

    const BONUS_DURATION_UNITS = [
      { value: 'minutes', label: 'Минуты' },
      { value: 'hours', label: 'Часы' },
      { value: 'days', label: 'Дни' },
    ];

    const getAvailableDataEditors = (group) => {
      const key = String(group || '');
      return (DATA_EDITOR_RULES[key] || [{ value: DATA_EDITOR_NONE, label: 'Без данных' }]).map((entry) => ({
        value: String(entry.value),
        label: String(entry.label),
      }));
    };

    const getDefaultDataEditor = (group) => getAvailableDataEditors(group)[0]?.value || DATA_EDITOR_NONE;

    const normalizeDataEditor = (group, value) => {
      const current = String(value || DATA_EDITOR_NONE);
      const available = getAvailableDataEditors(group).map((entry) => entry.value);
      return available.includes(current) ? current : getDefaultDataEditor(group);
    };

    const inferDataEditorType = (group, data) => {
      const safeGroup = String(group || '');
      if (safeGroup === 'Usable' && data && typeof data === 'object' && Array.isArray(data.random_box)) {
        return DATA_EDITOR_RANDOM_BOX;
      }
      if (safeGroup === 'Usable' && data && typeof data === 'object' && data.bonus && typeof data.bonus === 'object') {
        return DATA_EDITOR_BONUS;
      }
      if (safeGroup === 'Usable' && data && typeof data === 'object' && data.use_scenario && typeof data.use_scenario === 'object') {
        return DATA_EDITOR_USE_SCENARIO;
      }
      if (safeGroup === 'Potion' && data && typeof data === 'object' && data.potion && typeof data.potion === 'object') {
        return DATA_EDITOR_POTION;
      }
      return getDefaultDataEditor(safeGroup);
    };

    const normalizeRandomBoxItems = (items) => {
      if (!Array.isArray(items)) return [];
      return items.map((entry) => ({
        item_id: toNullableId(entry?.item_id) || 0,
        value: toNullableInt(entry?.value) ?? 1,
        chance: Number.isFinite(Number(entry?.chance)) ? Number(entry.chance) : 0,
      }));
    };

    const normalizePotionData = (potion) => ({
      effect: String(potion?.effect || ''),
      value: toNullableInt(potion?.value) ?? 0,
      lifetime: toNullableInt(potion?.lifetime) ?? 0,
      recast: toNullableInt(potion?.recast) ?? 0,
    });

    const normalizeBonusData = (bonus) => ({
      amount: toNullableInt(bonus?.amount) ?? 0,
      duration_minutes: toNullableInt(bonus?.duration_minutes) ?? 0,
      duration_hours: toNullableInt(bonus?.duration_hours) ?? 0,
      duration_days: toNullableInt(bonus?.duration_days) ?? 0,
      type: toNullableInt(bonus?.type) ?? 1,
    });

    const getBonusDurationUi = (bonus) => {
      if ((bonus?.duration_days ?? 0) > 0) return { unit: 'days', value: bonus.duration_days };
      if ((bonus?.duration_hours ?? 0) > 0) return { unit: 'hours', value: bonus.duration_hours };
      return { unit: 'minutes', value: Math.max(0, toNullableInt(bonus?.duration_minutes) ?? 0) };
    };

    const buildDataPayload = (model) => {
      const editorType = normalizeDataEditor(model?.Group, model?.DataEditorType);

      if (editorType === DATA_EDITOR_RANDOM_BOX) {
        const items = normalizeRandomBoxItems(model?.DataRandomBoxItems)
          .filter((entry) => toNullableId(entry?.item_id) && (toNullableInt(entry?.value) ?? 0) > 0 && Number(entry?.chance) > 0)
          .map((entry) => ({
            item_id: toNullableId(entry.item_id),
            value: toNullableInt(entry.value),
            chance: Number(entry.chance),
          }));

        return items.length ? { random_box: items } : null;
      }

      if (editorType === DATA_EDITOR_BONUS) {
        const amount = Math.max(0, toNullableInt(model?.DataBonusAmount) ?? 0);
        const bonusType = toNullableInt(model?.DataBonusType) ?? 1;
        const durationUnit = String(model?.DataBonusDurationUnit || 'minutes');
        const durationValue = Math.max(0, toNullableInt(model?.DataBonusDurationValue) ?? 0);

        return {
          bonus: {
            amount,
            duration_minutes: durationUnit === 'minutes' ? durationValue : 0,
            duration_hours: durationUnit === 'hours' ? durationValue : 0,
            duration_days: durationUnit === 'days' ? durationValue : 0,
            type: [1, 2, 3, 4].includes(bonusType) ? bonusType : 1,
          }
        };
      }

      if (editorType === DATA_EDITOR_POTION) {
        const potion = {
          effect: String(model?.DataPotionEffect || '').trim(),
          value: toNullableInt(model?.DataPotionValue) ?? 0,
          lifetime: toNullableInt(model?.DataPotionLifetime) ?? 0,
          recast: toNullableInt(model?.DataPotionRecast) ?? 0,
        };
        return { potion };
      }

      if (editorType === DATA_EDITOR_USE_SCENARIO) {
        const worldId = toNullableInt(model?.DataScenarioWorldID);
        const name = String(model?.DataScenarioName || '').trim();
        return {
          use_scenario: {
            name,
            world_id: worldId ?? -1,
          },
        };
      }

      return null;
    };

    const itemFields = {
      Comment: { type: 'text', label: 'Комментарий', ui: { placeholder: 'Опционально' } },
      Name: { type: 'text', label: 'Название', validate: { required: true } },
      Description: { type: 'textarea', label: 'Описание', ui: { rows: 2 } },
      Group: {
        label: 'Группа',
        ui: {
          type: 'select',
          options: GROUPS.map(value => ({ value, label: value })),
        }
      },
      Type: {
        label: 'Тип',
        ui: {
          type: 'select',
          ...(TypeRule?.fieldUI ? TypeRule.fieldUI() : {}),
        }
      },
      AT1: {
        type: 'db_select',
        label: 'Атрибут 1',
        ui: {
          dbKey: 'attribute',
          placeholder: '— атрибут —',
          showWhen: (data) => String(data?.Group || '') === 'Equipment',
        }
      },
      ATValue1: {
        type: 'number',
        label: 'Значение атрибута 1',
        ui: {
          step: 1,
          showWhen: (data) => String(data?.Group || '') === 'Equipment',
        }
      },
      AT2: {
        type: 'db_select',
        label: 'Атрибут 2',
        ui: {
          dbKey: 'attribute',
          placeholder: '— атрибут —',
          showWhen: (data) => String(data?.Group || '') === 'Equipment',
        }
      },
      ATValue2: {
        type: 'number',
        label: 'Значение атрибута 2',
        ui: {
          step: 1,
          showWhen: (data) => String(data?.Group || '') === 'Equipment',
        }
      },
      Flags: {
        label: 'Флаги',
        ui: {
          type: 'tags',
          options: FLAGS,
          placeholder: 'Добавить флаг…',
		  showWhen: (data) => !['Settings', 'Quest', 'Currency'].includes(data?.Group ?? ''),
        }
      },
      ScenarioMode: {
        label: 'Тип сценария',
        ui: {
          type: 'select',
          options: [
            { value: 'universal', label: 'Одиночный (Universal)' },
            { value: 'world', label: 'Мировой (World)' },
          ],
        }
      },
      ScenarioData: { type: 'scenario', label: 'ScenarioData', ui: { scenarioModePath: 'ScenarioMode' } },
      InitialPrice: 
	  { 
        type: 'number', 
        label: 'Начальная цена', 
        ui: { 
		  min: 0, 
		  step: 1,
		  showWhen: (data) => !['Settings', 'Quest', 'Currency'].includes(data?.Group ?? ''),
        } 
	  },
      RequiresProducts: 
	  { 
	    type: 'number', 
		label: 'Требует продуктов', 
		ui: { 
		  min: 0,
		  step: 1,
		  showWhen: (data) => !['Settings', 'Quest', 'Currency'].includes(data?.Group ?? ''),
		} 
	  },
	  DataEditorType: {
        label: 'Тип Data',
        ui: {
          type: 'select',
          options: (data) => getAvailableDataEditors(data?.Group),
        },
      },
      DataRandomBoxItems: {
        type: 'list',
        label: 'Random Box предметы',
        ui: {
          addLabel: 'Добавить предмет',
          listMode: 'table',
          tableHeader: ['Предмет', 'Количество', 'Шанс (%)'],
          tableCols: 'minmax(0,1fr) 140px 140px',
          tableColsMd: 'minmax(0,1fr) 160px 160px',
          showWhen: (data) => String(data?.DataEditorType || '') === DATA_EDITOR_RANDOM_BOX,
        },
        itemDefault: { item_id: 0, value: 1, chance: 0 },
        itemFields: {
          item_id: { type: 'db_select', label: 'Предмет', ui: { dbKey: 'item', placeholder: '— предмет —', searchPlaceholder: 'Поиск предмета…' } },
          value: { type: 'number', label: 'Количество', ui: { min: 1, step: 1 } },
          chance: { type: 'number', label: 'Шанс (%)', ui: { min: 0, step: 0.1 } },
        },
      },
      DataPotionEffect: {
        type: 'text',
        label: 'Эффект',
        ui: {
          placeholder: 'Tiny heal',
          showWhen: (data) => String(data?.DataEditorType || '') === DATA_EDITOR_POTION,
        },
      },
      DataPotionValue: {
        type: 'number',
        label: 'Число',
        ui: {
          min: 0,
          step: 1,
          showWhen: (data) => String(data?.DataEditorType || '') === DATA_EDITOR_POTION,
        },
      },
      DataPotionLifetime: {
        type: 'number',
        label: 'Время (сек.)',
        ui: {
          min: 0,
          step: 1,
          showWhen: (data) => String(data?.DataEditorType || '') === DATA_EDITOR_POTION,
        },
      },
      DataPotionRecast: {
        type: 'number',
        label: 'Время перезарядки (сек.)',
        ui: {
          min: 0,
          step: 1,
          showWhen: (data) => String(data?.DataEditorType || '') === DATA_EDITOR_POTION,
        },
      },
      DataBonusAmount: {
        type: 'number',
        label: 'Бонус: количество',
        ui: {
          min: 0,
          step: 1,
          showWhen: (data) => String(data?.DataEditorType || '') === DATA_EDITOR_BONUS,
        },
      },
      DataBonusType: {
        label: 'Бонус: тип',
        ui: {
          type: 'select',
          options: BONUS_TYPES.map((entry) => ({ value: String(entry.value), label: entry.label })),
          valueType: 'number',
          showWhen: (data) => String(data?.DataEditorType || '') === DATA_EDITOR_BONUS,
        },
      },
      DataBonusDurationValue: {
        type: 'number',
        label: 'Бонус: время',
        ui: {
          min: 0,
          step: 1,
          placeholder: 'Значение длительности',
          showWhen: (data) => String(data?.DataEditorType || '') === DATA_EDITOR_BONUS,
        },
      },
      DataBonusDurationUnit: {
        label: 'Ед. измерения времени',
        ui: {
          type: 'select',
          options: BONUS_DURATION_UNITS,
          showWhen: (data) => String(data?.DataEditorType || '') === DATA_EDITOR_BONUS,
        },
      },
      DataScenarioName: {
        type: 'text',
        label: 'Имя сценария',
        ui: {
          placeholder: 'Название сценария/активатора',
          showWhen: (data) => String(data?.DataEditorType || '') === DATA_EDITOR_USE_SCENARIO,
        },
      },
      DataScenarioWorldID: {
        type: 'db_select',
        label: 'Мир (WorldID)',
        ui: {
          dbKey: 'world',
          placeholder: '— выберите мир —',
          showWhen: (data) => String(data?.DataEditorType || '') === DATA_EDITOR_USE_SCENARIO,
        },
      },
    };

    const dirty = EditorCore.Dirty?.create
      ? EditorCore.Dirty.create({
          root: document.querySelector('.editor-main') || document.body,
          pill: document.getElementById('dirty-pill'),
          beforeUnload: true,
        })
      : { markDirty: () => {}, setClean: () => {} };

    const filterGroup = document.getElementById('filterGroup');
    const filterType = document.getElementById('filterType');
    if (filterGroup) {
      filterGroup.innerHTML = [
        '<option value=\"\">Все группы</option>',
        ...GROUPS.map(group => `<option value=\"${group}\">${group}</option>`),
      ].join('');
    }
    const renderTypeFilterOptions = () => {
      if (!filterType) return;

      const group = String(filterGroup?.value || '').trim();

      if (TypeRule?.syncFilterSelect) {
        TypeRule.syncFilterSelect(filterType, {
          keyValue: group,
          allOptions: TYPES_ALL,
          anyValue: '',
          anyLabel: 'Все типы',
          hideMode: 'display',
        });
        return;
      }

      // fallback (should not happen)
      filterType.disabled = false;
      filterType.style.display = '';
      const prev = String(filterType.value || '');
      filterType.innerHTML = [
        '<option value=\"\">Все типы</option>',
        ...TYPES_ALL.map(type => `<option value=\"${type}\">${type}</option>`),
      ].join('');
      filterType.value = (prev && TYPES_ALL.includes(prev)) ? prev : '';
    };

    renderTypeFilterOptions();

    const editor = EditorCore.DbEditor.mount(document.body, {
      resource: 'items',
      fields: itemFields,
      fieldOptions: fieldRenderOptions,
      dirty,
      transformList: (rows) => {
        const group = filterGroup?.value || '';
        const type = filterType?.value || '';
        const filtered = rows.filter(row => {
          if (group && String(row?.Group || '') !== group) return false;
          if (type && String(row?.Type || '') !== type) return false;
          return true;
        });
        return filtered.sort((a, b) => {
          const ga = String(a?.Group || '');
          const gb = String(b?.Group || '');
          if (ga !== gb) return ga.localeCompare(gb, 'ru');
          const na = String(a?.Name || '');
          const nb = String(b?.Name || '');
          if (na !== nb) return na.localeCompare(nb, 'ru');
          return Number(a?.ID || 0) - Number(b?.ID || 0);
        });
      },
      defaults: () => ({
        Comment: '',
        Name: '',
        Description: '',
        Group: 'Quest',
        Type: 'Default',
        Flags: [],
        ScenarioMode: 'universal',
        ScenarioData: '',
        InitialPrice: 0,
        RequiresProducts: 0,
        AT1: 0,
        AT2: 0,
        ATValue1: 0,
        ATValue2: 0,
        DataEditorType: DATA_EDITOR_NONE,
        DataRandomBoxItems: [],
        DataBonusAmount: 0,
        DataBonusType: 1,
        DataBonusDurationValue: 0,
        DataBonusDurationUnit: 'minutes',
        DataPotionEffect: '',
        DataPotionValue: 0,
        DataPotionLifetime: 0,
        DataPotionRecast: 0,
        DataScenarioName: '',
        DataScenarioWorldID: 0,
      }),
      rowToModel: (row) => {
        const group = String(row?.Group || 'Quest');
        const dataPayload = safeToJsonPayload(row?.Data);
        const dataEditorType = normalizeDataEditor(group, inferDataEditorType(group, dataPayload));
        const bonus = normalizeBonusData(dataPayload?.bonus);
        const bonusDurationUi = getBonusDurationUi(bonus);

        return ({
          Comment: String(row?.Comment || ''),
          Name: String(row?.Name || ''),
          Description: String(row?.Description || ''),
          Group: group,
          Type: TypeRule?.normalizeValue
            ? TypeRule.normalizeValue(group, row?.Type || 'Default', row)
            : (row?.Type || 'Default'),
          Flags: parseSet(row?.Flags, FLAGS),
          ScenarioMode: (() => {
            const mode = row?.ScenarioMode == null ? 'universal' : String(row?.ScenarioMode || 'universal');
            return mode === 'world' ? 'world' : 'universal';
          })(),
          ScenarioData: row?.ScenarioData == null ? '' : String(row?.ScenarioData),
          InitialPrice: Number(row?.InitialPrice ?? 0),
          RequiresProducts: Number(row?.RequiresProducts ?? 0),
          AT1: Number(row?.AT1 ?? 0),
          AT2: Number(row?.AT2 ?? 0),
          ATValue1: Number(row?.ATValue1 ?? 0),
          ATValue2: Number(row?.ATValue2 ?? 0),
          DataEditorType: dataEditorType,
          DataRandomBoxItems: normalizeRandomBoxItems(dataPayload?.random_box),
          DataBonusAmount: bonus.amount,
          DataBonusType: bonus.type,
          DataBonusDurationValue: bonusDurationUi.value,
          DataBonusDurationUnit: bonusDurationUi.unit,
          DataPotionEffect: normalizePotionData(dataPayload?.potion).effect,
          DataPotionValue: normalizePotionData(dataPayload?.potion).value,
          DataPotionLifetime: normalizePotionData(dataPayload?.potion).lifetime,
          DataPotionRecast: normalizePotionData(dataPayload?.potion).recast,
          DataScenarioName: String(dataPayload?.use_scenario?.name || ''),
          DataScenarioWorldID: Number(dataPayload?.use_scenario?.world_id ?? 0),
        });
      },
      modelToPayload: (model) => {
        const isEquipment = String(model?.Group || '') === 'Equipment';
        const normalizedDataEditorType = normalizeDataEditor(model?.Group, model?.DataEditorType);
        return ({
        Comment: String(model?.Comment || ''),
        Name: String(model?.Name || ''),
        Description: String(model?.Description || ''),
        Group: String(model?.Group || 'Quest'),
        Type: TypeRule?.normalizeValue
          ? TypeRule.normalizeValue(model?.Group || 'Quest', model?.Type || 'Default', model)
          : (model?.Type || 'Default'),
        Flags: joinSet(model?.Flags),
        ScenarioMode: model?.ScenarioMode ? String(model.ScenarioMode) : 'universal',
        ScenarioData: model?.ScenarioData ? String(model.ScenarioData) : null,
        InitialPrice: toNullableInt(model?.InitialPrice),
        RequiresProducts: toNullableInt(model?.RequiresProducts),
        AT1: isEquipment ? toNullableId(model?.AT1) : null,
        ATValue1: isEquipment ? toNullableInt(model?.ATValue1) : null,
        AT2: isEquipment ? toNullableId(model?.AT2) : null,
        ATValue2: isEquipment ? toNullableInt(model?.ATValue2) : null,
        Data: buildDataPayload({ ...model, DataEditorType: normalizedDataEditorType }),
        });
      },
      listItem: (row) => ({
        title: row?.Name || `Предмет #${row?.ID || 0}`,
        subtitle: `${row?.Group || '—'} · ID ${row?.ID ?? '—'}`,
      }),
      getTitle: (model, id) => (id ? `Предмет: ${model?.Name || `#${id}`}` : 'Новый предмет'),
      getSubtitle: (model, id) => {
        if (!model) return '';
        const group = model.Group ? `Группа: ${model.Group}` : 'Группа: —';
        const type = model.Type ? `Тип: ${model.Type}` : 'Тип: —';
        return id ? `ID ${id} · ${group} · ${type}` : `${group} · ${type}`;
      },
      emptyTitle: 'Выберите предмет',
      emptySubtitle: 'или создайте новый',

      // group switching toggles fields (attributes + type rules), so we normalize and rerender
      rerenderOnChange: (model, meta) => {
        if (meta?.path === 'Group') {
          model.DataEditorType = normalizeDataEditor(model?.Group, model?.DataEditorType);
          if (TypeRule?.normalizeModel) TypeRule.normalizeModel(model);
          return true;
        }
        if (meta?.path === 'DataEditorType') return true;
        if (meta?.path === 'ScenarioMode') return true;
        if (TypeRule?.normalizeModel) TypeRule.normalizeModel(model);
        return false;
      },
    });

    filterGroup?.addEventListener('change', () => {
      renderTypeFilterOptions();
      editor.refresh();
    });
    filterType?.addEventListener('change', () => {
      editor.refresh();
    });
  </script>
</body>
</html>
