<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editor Studio</title>

  <!-- Shared theme (CSS vars) -->
  <link rel="stylesheet" href="editor-core/editor-theme.css" />
  <link rel="stylesheet" href="editor-core/editor-template.css" />

  <!-- Fonts + icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <!-- Tailwind (CDN). Load config BEFORE tailwindcss. -->
  <script src="editor-core/tailwind-theme.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

  <script src="studio.manifest.js"></script>

  <style>
    html, body { height: 100%; }
    body { overflow: hidden; }
    .studio-iframe { width: 100%; height: 100%; border: 0; background: var(--editor-bg); }
    .studio-item {
      transition: background-color .14s ease, border-color .14s ease, transform .1s ease, box-shadow .14s ease;
    }
    .studio-item:hover { transform: translateY(-1px); }
    .studio-item:focus-visible {
      outline: none;
      border-color: var(--editor-primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, .28);
    }
    .studio-item.active {
      background: rgba(99, 102, 241, 0.16);
      border-color: var(--editor-primary);
      box-shadow: 0 0 0 1px rgba(99, 102, 241, .3);
    }
    .studio-item.active i { color: var(--editor-primary); }
    @media (prefers-reduced-motion: reduce) {
      .studio-item,
      .studio-item:hover { transition: none; transform: none; }
    }
  </style>
</head>

<body class="editor-theme" data-editor="home">
  <div id="studioApp" class="h-screen flex overflow-hidden hidden">
    <!-- Sidebar (adaptive) -->
    <aside id="studioSidebar" class="editor-surface border-r w-80 flex-shrink-0 hidden md:flex flex-col">
      <div class="h-16 border-b border-light flex items-center justify-between px-4">
        <div class="flex items-center gap-3 min-w-0">
          <i class="fa-solid fa-layer-group text-accent"></i>
          <div class="min-w-0">
            <div class="font-bold text-lg truncate">Editor Studio</div>
            <div class="text-sm editor-muted-text truncate">Общее ядро • модульные редакторы</div>
          </div>
        </div>
      </div>

      <div class="p-3 border-b border-light">
        <input id="studioSearch" type="search" class="w-full form-input" placeholder="Поиск редактора..." />
      </div>

      <div id="studioNav" class="flex-grow overflow-y-auto p-2"></div>

      <div class="p-3 border-t border-light flex gap-2">
        <button id="open-new-tab" class="editor-btn editor-btn-secondary w-full" title="Открыть текущий редактор в новой вкладке">
          <i class="fa-solid fa-arrow-up-right-from-square"></i>
          <span>Открыть во вкладке</span>
        </button>
      </div>
    </aside>

    <!-- Mobile top bar -->
    <div class="flex flex-col flex-grow overflow-hidden">
      <header class="h-16 editor-surface border-b flex items-center justify-between px-4 md:hidden">
        <button id="mobileMenuBtn" class="editor-btn editor-btn-secondary">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="font-semibold" id="mobileTitle">Editor Studio</div>
        <button id="mobileNewTabBtn" class="editor-btn editor-btn-secondary" title="Вкладка">
          <i class="fa-solid fa-arrow-up-right-from-square"></i>
        </button>
      </header>

      <main class="flex-grow overflow-hidden">
        <iframe id="editor-frame" class="studio-iframe" src=""></iframe>
      </main>
    </div>

    <!-- Mobile sidebar overlay -->
    <div id="mobileOverlay" class="hidden fixed inset-0 z-[400]">
      <div class="absolute inset-0" style="background: rgba(0,0,0,.55)"></div>
      <div class="absolute top-0 left-0 h-full w-80 editor-surface border-r flex flex-col">
        <div class="h-16 border-b border-light flex items-center justify-between px-4">
          <div class="font-bold">Меню</div>
          <button id="mobileCloseBtn" class="editor-btn editor-btn-secondary"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="p-3 border-b border-light">
          <input id="mobileSearch" type="search" class="w-full form-input" placeholder="Поиск редактора..." />
        </div>
        <div id="mobileNav" class="flex-grow overflow-y-auto p-2"></div>
      </div>
    </div>
  </div>

  <div id="authOverlay" class="fixed inset-0 z-[500]">
    <div class="absolute inset-0" style="background: rgba(2,6,23,.82)"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div class="editor-surface border border-light rounded-2xl p-6 w-full max-w-md shadow-2xl">
        <div class="flex items-center gap-3 mb-2">
          <i class="fa-solid fa-shield-halved text-accent"></i>
          <h2 class="text-xl font-bold">Авторизация Editor Studio</h2>
        </div>
        <p class="editor-muted-text text-sm mb-4">Для работы с редактором требуется вход администратора.</p>

        <div class="space-y-3">
          <div>
            <div class="text-sm font-medium text-slate-200 mb-1">Логин</div>
            <input id="auth-user" type="text" class="w-full form-input" value="admin" autocomplete="username" />
          </div>
          <div>
            <div class="text-sm font-medium text-slate-200 mb-1">Пароль</div>
            <input id="auth-pass" type="password" class="w-full form-input" value="admin1" autocomplete="current-password" />
          </div>
        </div>

        <button id="auth-login-btn" class="editor-btn editor-btn-primary w-full mt-4">
          <i class="fa-solid fa-right-to-bracket"></i>
          <span>Войти как администратор</span>
        </button>
        <div id="auth-status" class="text-sm mt-3 editor-muted-text"></div>
      </div>
    </div>
  </div>

  <script>
    const frame = document.getElementById('editor-frame');
    const openNewTab = document.getElementById('open-new-tab');

    const sidebarNav = document.getElementById('studioNav');
    const studioApp = document.getElementById('studioApp');
    const mobileOverlay = document.getElementById('mobileOverlay');
    const mobileNav = document.getElementById('mobileNav');
    const mobileTitle = document.getElementById('mobileTitle');
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileCloseBtn = document.getElementById('mobileCloseBtn');
    const mobileNewTabBtn = document.getElementById('mobileNewTabBtn');
    const studioSearch = document.getElementById('studioSearch');
    const mobileSearch = document.getElementById('mobileSearch');

    const GROUPS = Array.isArray(window.STUDIO_MANIFEST) ? window.STUDIO_MANIFEST : [];
    const EDITORS = GROUPS.flatMap(g => g.items || []);

    const authOverlay = document.getElementById('authOverlay');
    const authUser = document.getElementById('auth-user');
    const authPass = document.getElementById('auth-pass');
    const authLoginBtn = document.getElementById('auth-login-btn');
    const authStatus = document.getElementById('auth-status');

    const byKey = (key) => EDITORS.find(e => e.key === key) || EDITORS[0] || null;
    const normalizeEditorKey = (value) => String(value || '').replace(/^#/, '').trim();
    const DIRTY_STATUS_TIMEOUT = 350;

    let activeKey = '';
    let dirtyStatusRequestSeq = 0;
    let openEditorRequestSeq = 0;
    let isAuthorized = false;
    let isAuthRequestInFlight = false;

    const setAuthStatus = (text = '', tone = 'muted') => {
      if (!authStatus) return;
      const color = tone === 'ok' ? 'text-emerald-300' : tone === 'err' ? 'text-red-300' : 'editor-muted-text';
      authStatus.className = `text-sm mt-3 ${color}`;
      authStatus.textContent = text;
    };

    const setAuthOverlay = (visible) => {
      authOverlay?.classList.toggle('hidden', !visible);
      studioApp?.classList.toggle('hidden', visible);
      if (visible) {
        authUser?.focus();
        document.body.style.overflow = 'hidden';
      } else {
        document.body.style.overflow = '';
      }
    };

    const authRequest = async (action, payload = null) => {
      const options = {
        method: payload ? 'POST' : 'GET',
        credentials: 'same-origin',
        headers: payload ? { 'Content-Type': 'application/json' } : undefined,
        body: payload ? JSON.stringify(payload) : undefined,
      };
      const res = await fetch(`api/auth.php?action=${encodeURIComponent(action)}`, options);
      const json = await res.json().catch(() => ({}));
      if (!res.ok || !json?.ok) {
        return { ok: false, error: json?.error || `HTTP ${res.status}` };
      }
      return json;
    };

    const ensureAuthorized = async () => {
      if (isAuthRequestInFlight) return false;
      isAuthRequestInFlight = true;
      const status = await authRequest('status');
      isAuthRequestInFlight = false;
      if (status.ok && status.authorized) {
        isAuthorized = true;
        setAuthOverlay(false);
        return true;
      }
      isAuthorized = false;
      frame.src = 'about:blank';
      setAuthStatus('Введите данные администратора для входа.');
      setAuthOverlay(true);
      return false;
    };

    const getSearchTerm = () => String(studioSearch?.value || mobileSearch?.value || '').trim();

    const renderNav = (root, active, term = '') => {
      root.innerHTML = '';
      const q = term.toLowerCase();
      let hasItems = false;
      const fragment = document.createDocumentFragment();
      for (const g of GROUPS) {
        const items = (g.items || []).filter((e) => {
          if (!q) return true;
          const hay = `${e.title || ''} ${e.key || ''}`.toLowerCase();
          return hay.includes(q);
        });
        if (!items.length) continue;
        hasItems = true;
        const header = document.createElement('div');
        header.className = 'px-3 pt-3 pb-2 text-xs tracking-wider uppercase editor-muted-text';
        header.textContent = g.title || 'Группа';
        fragment.appendChild(header);

        for (const e of items) {
          const btn = document.createElement('button');
          btn.className = `studio-item w-full text-left p-3 rounded-xl border ${e.key === active ? 'active' : 'border-light hover:bg-light'} flex items-center gap-3`;
          btn.innerHTML = `<i class="fa-solid ${e.icon} w-5 text-center"></i><div class="min-w-0"><div class="font-semibold truncate">${e.title}</div><div class="text-xs editor-muted-text truncate">${e.key}</div></div>`;
          btn.addEventListener('click', () => openEditor(e.key, { closeMobile: true }));
          fragment.appendChild(btn);
        }
      }
      if (!hasItems) {
        root.innerHTML = `<div class="editor-empty-state">Ничего не найдено</div>`;
        return;
      }
      root.appendChild(fragment);
    };

    const renderAllNavs = (active, term = '') => {
      renderNav(sidebarNav, active, term);
      renderNav(mobileNav, active, term);
    };

    const requestFrameDirtyStatus = () => {
      const frameWindow = frame?.contentWindow;
      if (!frameWindow || !activeKey) return Promise.resolve({ supported: false, dirty: false });
      const requestId = `dirty:${Date.now()}:${++dirtyStatusRequestSeq}`;

      return new Promise((resolve) => {
        let done = false;
        let timer = null;

        const finish = (result) => {
          if (done) return;
          done = true;
          window.removeEventListener('message', onMessage);
          if (timer) clearTimeout(timer);
          resolve(result);
        };

        const onMessage = (event) => {
          if (event.source !== frameWindow) return;
          const data = event.data || {};
          if (data?.type !== 'editor-shell:dirty-status' || data.requestId !== requestId) return;
          finish({ supported: true, dirty: !!data.dirty });
        };

        window.addEventListener('message', onMessage);
        timer = setTimeout(() => finish({ supported: false, dirty: false }), DIRTY_STATUS_TIMEOUT);
        frameWindow.postMessage({ type: 'editor-shell:request-dirty-status', requestId }, '*');
      });
    };

    const openEditor = async (key, { closeMobile = false, syncHash = true } = {}) => {
      if (!isAuthorized) {
        await ensureAuthorized();
        if (!isAuthorized) return;
      }
      const requestSeq = ++openEditorRequestSeq;
      const e = byKey(key);
      if (!e) {
        frame.src = '';
        renderAllNavs('', getSearchTerm());
        return;
      }
      if (activeKey && e.key !== activeKey) {
        const dirtyState = await requestFrameDirtyStatus();
        if (requestSeq !== openEditorRequestSeq) return;
        if (dirtyState.supported && dirtyState.dirty) {
          const approved = confirm('Есть несохранённые изменения. Продолжить без сохранения?');
          if (!approved) return;
        }
      }
      if (requestSeq !== openEditorRequestSeq) return;
      activeKey = e.key;
      const term = getSearchTerm();
      renderAllNavs(e.key, term);
      frame.src = e.src;
      storageSet('studio.activeEditor', e.key);
      if (syncHash && location.hash !== '#' + e.key) location.hash = e.key;

      if (mobileTitle) mobileTitle.textContent = e.title || 'Editor Studio';
      if (closeMobile && mobileOverlay) mobileOverlay.classList.add('hidden');
    };

    const syncSearchValue = (value, source) => {
      const term = String(value || '').trim();
      if (studioSearch && source !== studioSearch) studioSearch.value = term;
      if (mobileSearch && source !== mobileSearch) mobileSearch.value = term;
      renderAllNavs(activeKey, term);
    };

    studioSearch?.addEventListener('input', (event) => {
      syncSearchValue(event.target.value, event.target);
    });
    mobileSearch?.addEventListener('input', (event) => {
      syncSearchValue(event.target.value, event.target);
    });

    const focusSearch = () => {
      const onMobile = window.matchMedia('(max-width: 767px)').matches;
      if (onMobile) {
        mobileOverlay?.classList.remove('hidden');
        mobileSearch?.focus();
      } else {
        studioSearch?.focus();
      }
    };

    const safeStorage = (() => {
      try {
        const key = '__studio_test__';
        localStorage.setItem(key, '1');
        localStorage.removeItem(key);
        return localStorage;
      } catch (err) {
        return null;
      }
    })();

    const storageGet = (key) => safeStorage?.getItem(key) || '';
    const storageSet = (key, value) => safeStorage?.setItem(key, value);

    document.addEventListener('keydown', (event) => {
      const tag = event.target?.tagName;
      const isTyping = tag === 'INPUT' || tag === 'TEXTAREA' || event.target?.isContentEditable;
      if (isTyping && event.key === '/') return;
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') {
        event.preventDefault();
        focusSearch();
      } else if (event.key === '/' && !event.ctrlKey && !event.metaKey && !event.altKey) {
        event.preventDefault();
        focusSearch();
      }
    });

    openNewTab.addEventListener('click', () => {
      if (!isAuthorized) return;
      const fallbackKey = EDITORS[0]?.key || '';
      const key = normalizeEditorKey(location.hash) || storageGet('studio.activeEditor') || fallbackKey;
      const e = byKey(key);
      if (!e) return;
      window.open(e.src, '_blank', 'noopener');
    });

    mobileNewTabBtn?.addEventListener('click', () => openNewTab.click());
    mobileMenuBtn?.addEventListener('click', () => {
      mobileOverlay.classList.remove('hidden');
    });
    mobileCloseBtn?.addEventListener('click', () => mobileOverlay.classList.add('hidden'));
    mobileOverlay?.addEventListener('click', (e) => {
      if (e.target === mobileOverlay) mobileOverlay.classList.add('hidden');
    });

    let isHashSync = false;
    const replaceHash = (key) => {
      if (location.hash === '#' + key) return;
      const url = new URL(location.href);
      url.hash = key;
      isHashSync = true;
      history.replaceState(null, '', url);
      isHashSync = false;
    };

    window.addEventListener('hashchange', () => {
      if (!isAuthorized) return;
      if (isHashSync) return;

      const hashKey = normalizeEditorKey(location.hash);
      const editor = EDITORS.find((entry) => entry.key === hashKey);

      if (editor) {
        if (editor.key !== activeKey) openEditor(editor.key, { syncHash: false });
        return;
      }

      const fallbackEditor = byKey(normalizeEditorKey(storageGet('studio.activeEditor')));
      if (!fallbackEditor) return;

      if (fallbackEditor.key !== activeKey) openEditor(fallbackEditor.key, { syncHash: false });
      replaceHash(fallbackEditor.key);
    });

    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (data?.type !== 'editor-shell:auth-required') return;
      isAuthorized = false;
      setAuthStatus('Сессия истекла. Повторите вход администратора.', 'err');
      setAuthOverlay(true);
      frame.src = 'about:blank';
    });

    authLoginBtn?.addEventListener('click', async () => {
      if (isAuthRequestInFlight) return;
      const user = String(authUser?.value || 'admin').trim() || 'admin';
      const password = String(authPass?.value || '');
      if (!password) {
        setAuthStatus('Введите пароль администратора.', 'err');
        return;
      }
      authLoginBtn.disabled = true;
      isAuthRequestInFlight = true;
      setAuthStatus('Проверяем доступ...');
      const login = await authRequest('login', { user, password });
      authLoginBtn.disabled = false;
      isAuthRequestInFlight = false;
      if (!login.ok) {
        setAuthStatus(login.error || 'Ошибка авторизации.', 'err');
        return;
      }
      isAuthorized = true;
      setAuthStatus('Вход выполнен.', 'ok');
      setAuthOverlay(false);
      const fallbackKey = normalizeEditorKey(location.hash) || storageGet('studio.activeEditor') || EDITORS[0]?.key || '';
      openEditor(fallbackKey);
    });

    authPass?.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        authLoginBtn?.click();
      }
    });

    // Initial editor selection: hash > localStorage > default
    const initial = normalizeEditorKey(location.hash) || storageGet('studio.activeEditor') || EDITORS[0]?.key || '';
    ensureAuthorized().then((ok) => {
      if (ok) openEditor(initial);
    });
  </script>
</body>
</html>
