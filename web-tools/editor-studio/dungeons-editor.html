<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Подземелья • tw_dungeons</title>
  <script src="editor-core/page-loader.js" data-mode="event"></script>
</head>

<body class="editor-theme" data-editor="dungeons">
  <div class="editor-page">
    <div class="editor-page-header">
      <div class="editor-page-title">
        <i class="fa-solid fa-dungeon text-accent text-xl"></i>
        <div>
          <h1>Подземелья</h1>
          <div class="editor-page-sub">Редактор таблицы <code>tw_dungeons</code>.</div>
        </div>
      </div>
      <div class="editor-page-actions">
        <button class="editor-btn editor-btn-secondary" data-editor-role="refresh">
          <i class="fa-solid fa-rotate"></i><span>Обновить</span>
        </button>
        <button class="editor-btn editor-btn-primary" data-editor-role="new">
          <i class="fa-solid fa-plus"></i><span>Новое подземелье</span>
        </button>
      </div>
    </div>

    <div class="editor-shell editor-shell--docked">
      <aside class="editor-sidebar editor-dock-sidebar">
        <div class="editor-dock-pad">
          <div class="flex items-center justify-between gap-3">
            <div>
              <div class="text-sm font-semibold">Список подземелий</div>
              <div class="text-xs editor-muted-text">Всего: <span data-editor-role="count">—</span></div>
            </div>
          </div>

          <div class="mt-3">
            <div class="editor-search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input data-editor-role="search" type="search" class="w-full editor-input form-input" placeholder="Поиск по ID / уровню / миру..." />
            </div>
          </div>

          <div class="mt-4 editor-sidebar-list editor-scroll" style="max-height: 590px" data-editor-role="list"></div>
        </div>
      </aside>

      <section class="editor-main editor-dock-main">
        <div class="editor-dock-pad">
          <div class="editor-sticky-toolbar flex items-start justify-between gap-4">
            <div>
              <div class="text-lg font-semibold" data-editor-role="title">Выберите подземелье</div>
              <div class="editor-muted-text text-sm mt-1" data-editor-role="subtitle">или создайте новое</div>
            </div>
            <div class="editor-page-actions">
              <span id="dirty-pill" class="editor-dirty-pill hidden">Данные не сохранены</span>
              <button class="editor-btn editor-btn-primary" data-editor-role="save" disabled>
                <i class="fa-solid fa-floppy-disk"></i><span>Сохранить</span>
              </button>
              <button class="editor-btn editor-btn-secondary" data-editor-role="delete" disabled>
                <i class="fa-solid fa-trash"></i><span>Удалить</span>
              </button>
            </div>
          </div>

          <div class="editor-section mt-4">
            <div class="editor-form-grid-2" data-editor-role="form"></div>
          </div>

          <div class="mt-4" data-editor-role="status"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const { fieldRenderOptions } = window.EditorCoreBootstrap || EditorCore.bootstrapEditor({ mode: 'event' });

    const toNullableInt = (value, fallback = 0) => {
      const num = Number(value);
      return Number.isFinite(num) ? Math.trunc(num) : fallback;
    };

    const fields = {
      Level: { type: 'number', label: 'Уровень', ui: { min: 1, step: 1 } },
      WorldID: { type: 'db_select', label: 'Мир', ui: { dbKey: 'world', placeholder: '— мир —' } },
      DoorX: { type: 'number', label: 'DoorX', ui: { step: 1 } },
      DoorY: { type: 'number', label: 'DoorY', ui: { step: 1 } },
      Scenario: { type: 'scenario', label: 'Scenario', ui: { scenarioMode: 'dungeon' } },
    };

    const dirty = EditorCore.Dirty?.create
      ? EditorCore.Dirty.create({
          root: document.querySelector('.editor-main') || document.body,
          pill: document.getElementById('dirty-pill'),
          beforeUnload: true,
        })
      : { markDirty: () => {}, setClean: () => {} };

    EditorCore.DbEditor.mount(document.body, {
      resource: 'dungeons',
      fields,
      fieldOptions: fieldRenderOptions,
      dirty,
      defaults: () => ({
        Level: 1,
        WorldID: 0,
        DoorX: 0,
        DoorY: 0,
        Scenario: '',
      }),
      rowToModel: (row) => ({
        Level: Number(row?.Level ?? 1),
        WorldID: Number(row?.WorldID ?? 0),
        DoorX: Number(row?.DoorX ?? 0),
        DoorY: Number(row?.DoorY ?? 0),
        Scenario: row?.Scenario == null ? '' : String(row?.Scenario),
      }),
      modelToPayload: (model) => ({
        Level: Math.max(1, toNullableInt(model?.Level, 1)),
        WorldID: toNullableInt(model?.WorldID, 0),
        DoorX: toNullableInt(model?.DoorX, 0),
        DoorY: toNullableInt(model?.DoorY, 0),
        Scenario: model?.Scenario ? String(model.Scenario) : null,
      }),
      listItem: (row) => ({
        title: `Dungeon #${row?.ID || 0}`,
        subtitle: `Lvl ${row?.Level || 1} · World ${row?.WorldID || '—'}`,
      }),
      getTitle: (_model, id) => (id ? `Подземелье #${id}` : 'Новое подземелье'),
      getSubtitle: (model, id) => {
        if (!model) return '';
        const lvl = Number(model?.Level || 1);
        const world = Number(model?.WorldID || 0);
        return id ? `ID ${id} · Lvl ${lvl} · World ${world || '—'}` : `Lvl ${lvl} · World ${world || '—'}`;
      },
      emptyTitle: 'Выберите подземелье',
      emptySubtitle: 'или создайте новое',
    });
  </script>
</body>
</html>
