# Apache Configuration for Editor Studio
# Mount as volume in docker-compose.yml

<VirtualHost *:80>
    ServerAdmin admin@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Deny access to sensitive files
        <FilesMatch "\.(env|git|gitignore|md|json|conf)$">
            Require all denied
        </FilesMatch>
    </Directory>

    # Protect data directory from direct access
    <Directory /var/www/html/data>
        Options -Indexes
        AllowOverride None

        # Allow only PHP scripts to access
        <FilesMatch "\.php$">
            Require all granted
        </FilesMatch>

        # Deny direct access to other files
        <FilesMatch "^(?!.*\.php$)">
            Require all denied
        </FilesMatch>
    </Directory>

    # Protect scenarios directory
    <Directory /var/www/html/scenarios>
        Options -Indexes
        AllowOverride None

        # Only allow access from PHP
        <FilesMatch "\.json$">
            Require all denied
        </FilesMatch>
    </Directory>

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "same-origin"

    # Disable server signature
    ServerSignature Off

    # Error and access logs
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # PHP settings (can be overridden in php.ini)
    <IfModule mod_php.c>
        php_value upload_max_filesize 50M
        php_value post_max_size 50M
        php_value max_execution_time 300
        php_value memory_limit 256M
    </IfModule>
</VirtualHost>

