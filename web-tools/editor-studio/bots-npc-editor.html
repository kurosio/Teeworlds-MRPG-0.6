<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPC — tw_bots_npc</title>
  <script src="editor-core/page-loader.js" data-mode="event"></script>

  <style>
    .npc-skin-frame {
      background: var(--editor-surface);
      border: 1px solid var(--editor-border);
    }
    .npc-skin-frame img {
      image-rendering: pixelated;
    }
  </style>
</head>

<body class="editor-theme" data-editor="bots_npc">
  <div class="editor-page">

    <!-- ═══════════════════ HEADER ═══════════════════ -->
    <div class="editor-page-header">
      <div class="editor-page-title">
        <i class="fa-solid fa-user-ninja text-accent text-xl"></i>
        <div>
          <h1>NPC</h1>
          <div class="editor-page-sub">NPC bots: position, emotions, linked dialog.</div>
        </div>
      </div>
      <div class="editor-page-actions">
        <button class="editor-btn editor-btn-secondary" data-action="refresh">
          <i class="fa-solid fa-rotate"></i><span>Refresh</span>
        </button>
        <button class="editor-btn editor-btn-primary" data-action="new">
          <i class="fa-solid fa-plus"></i><span>New NPC</span>
        </button>
      </div>
    </div>

    <!-- ═══════════════════ LAYOUT ═══════════════════ -->
    <div class="editor-shell editor-shell--docked">

      <!-- ─── Sidebar ─── -->
      <aside class="editor-sidebar editor-dock-sidebar">
        <div class="editor-dock-pad">
          <div class="flex items-center justify-between gap-3">
            <div>
              <div class="text-sm font-semibold">NPC List</div>
              <div class="text-xs editor-muted-text">
                Total: <span data-bind="count">—</span>
              </div>
            </div>
          </div>

          <div class="mt-3">
            <div class="editor-search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input
                data-bind="search"
                type="search"
                class="w-full editor-input form-input"
                placeholder="Search by ID/bot/world…"
              />
            </div>
          </div>

          <div
            class="mt-4 editor-sidebar-list editor-scroll"
            style="max-height: 590px"
            data-bind="list"
          ></div>
        </div>
      </aside>

      <!-- ─── Main panel ─── -->
      <section class="editor-main editor-dock-main">
        <div class="editor-dock-pad">

          <!-- Toolbar -->
          <div class="editor-sticky-toolbar flex items-start justify-between gap-4">
            <div>
              <div class="text-lg font-semibold" data-bind="title">Select an NPC</div>
              <div class="editor-muted-text text-sm mt-1" data-bind="subtitle">
                or create a new one
              </div>
            </div>
            <div class="editor-page-actions">
              <span data-bind="dirty-pill" class="editor-dirty-pill hidden">
                Unsaved changes
              </span>
              <button class="editor-btn editor-btn-primary" data-action="save" disabled>
                <i class="fa-solid fa-floppy-disk"></i><span>Save</span>
              </button>
              <button class="editor-btn editor-btn-secondary hidden" data-action="cancel" disabled>
                <i class="fa-solid fa-rotate-left"></i><span>Cancel</span>
              </button>
              <button class="editor-btn editor-btn-secondary" data-action="delete" disabled>
                <i class="fa-solid fa-trash"></i><span>Delete</span>
              </button>
            </div>
          </div>

          <!-- Form card -->
          <div class="editor-section mt-4">
            <div class="editor-card p-4">
              <div class="flex items-center justify-between gap-3">
                <div>
                  <div class="font-semibold">NPC Parameters</div>
                  <div class="editor-muted-text text-sm">Tabs: basic and dialog.</div>
                </div>
                <div data-bind="tab-root"></div>
              </div>

              <div class="mt-4">
                <!-- Tab: Basic -->
                <div data-tab="basic" class="space-y-6">
                  <div class="grid gap-4 md:grid-cols-[220px,1fr] items-start">
                    <div class="editor-card p-4 flex flex-col items-center gap-3">
                      <div class="text-xs uppercase tracking-wider editor-muted-text">Skin</div>
                      <div
                        class="npc-skin-frame w-36 h-36 rounded-2xl flex items-center justify-center"
                      >
                        <img data-bind="skin-img" class="w-28 h-28" alt="Skin preview" />
                      </div>
                      <div data-bind="skin-meta" class="text-xs editor-muted-text text-center">
                        Skin not loaded
                      </div>
                    </div>
                    <div class="editor-form-grid-2" data-bind="form-basic"></div>
                  </div>
                </div>

                <!-- Tab: Dialog -->
                <div data-tab="dialog" class="space-y-6 hidden">
                  <div data-bind="form-dialog"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="mt-4" data-bind="status"></div>
        </div>
      </section>
    </div>
  </div>

  <script>
    /* ═══════════════════════════════════════════════════
       CONFIGURATION — everything configurable is collected here
       ═══════════════════════════════════════════════════ */

    const TABLE = 'bots_npc';

    const EMOTE_OPTIONS = [
      { value: '',         label: '— none —'   },
      { value: 'Pain',     label: 'Pain'       },
      { value: 'Happy',    label: 'Happy'      },
      { value: 'Surprise', label: 'Surprise'   },
      { value: 'Angry',    label: 'Angry'      },
      { value: 'Blink',    label: 'Blink'      },
    ];

    const DIALOG_SIDE_OPTIONS = [
      { value: 'default',  label: 'speaks for' },
      { value: 'author',   label: 'author'       },
      { value: 'thoughts', label: 'thoughts'       },
    ];

    const DIALOG_EXTRA_SPEAKERS = [
      { value: -1, label: 'Player'       },
      { value:  0, label: 'Current bot' },
    ];

    const BASIC_FIELDS = {
      BotID: {
        type: 'db_select',
        label: 'NPC (BotID)',
        validate: { required: true },
        ui: { dbKey: 'mob', placeholder: '— bot —', searchPlaceholder: 'Search bot…' },
      },
      WorldID: {
        type: 'db_select',
        label: 'World (WorldID)',
        ui: { dbKey: 'world', placeholder: '— world —', searchPlaceholder: 'Search world…' },
      },
      PosX: {
        type: 'number',
        label: 'PosX',
        ui: { min: 0, step: 1 },
      },
      PosY: {
        type: 'number',
        label: 'PosY',
        ui: { min: 0, step: 1 },
      },
      GiveQuestID: {
        type: 'db_select',
        label: 'Quest (GiveQuestID)',
        ui: { dbKey: 'quest', placeholder: '— no quest —', searchPlaceholder: 'Search quest…' },
      },
      Function: {
        type: 'number',
        label: 'Function',
        ui: { step: 1, placeholder: '-1' },
      },
      Static: {
        type: 'toggle',
        label: 'Static',
      },
      Emote: {
        label: 'Emote',
        ui: { type: 'select', options: EMOTE_OPTIONS },
      },
    };

    const TAB_DEFS = [
      { id: 'basic',  title: 'Basic', icon: 'fa-bars-staggered' },
      { id: 'dialog', title: 'Dialog',   icon: 'fa-comments'       },
    ];

    /* ═══════════════════════════════════════════════════
       UTILITIES
       ═══════════════════════════════════════════════════ */

    const { fieldRenderOptions } =
      window.EditorCoreBootstrap || EditorCore.bootstrapEditor({ mode: 'event' });

    /** Safe deep cloning */
    const clone = (v) => {
      if (v == null) return v;
      try { return structuredClone(v); }
      catch { return JSON.parse(JSON.stringify(v)); }
    };

    /** Get element by data-bind */
    const $  = (key) => document.querySelector(`[data-bind="${key}"]`);
    const $a = (key) => document.querySelector(`[data-action="${key}"]`);

    /** Safe numeric cast */
    const num = (v, fallback = 0) => {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    };

    /** Normalize DialogData from any format */
    const parseDialogData = (raw) => {
      if (Array.isArray(raw)) return raw;
      if (typeof raw === 'string') {
        try { const p = JSON.parse(raw); return Array.isArray(p) ? p : []; }
        catch { return []; }
      }
      return [];
    };

    /** Value from lookup map */
    const lookupLabel = (map, id, fallback = '—') =>
      (id && map.get(String(id))) || fallback;

    /* ═══════════════════════════════════════════════════
       DOM CACHING
       ═══════════════════════════════════════════════════ */

    const DOM = {
      list:       $('list'),
      search:     $('search'),
      title:      $('title'),
      subtitle:   $('subtitle'),
      status:     $('status'),
      count:      $('count'),
      tabRoot:    $('tab-root'),
      formBasic:  $('form-basic'),
      formDialog: $('form-dialog'),
      skinImg:    $('skin-img'),
      skinMeta:   $('skin-meta'),
      dirtyPill:  $('dirty-pill'),
      tabBasic:   document.querySelector('[data-tab="basic"]'),
      tabDialog:  document.querySelector('[data-tab="dialog"]'),

      btnRefresh: $a('refresh'),
      btnNew:     $a('new'),
      btnSave:    $a('save'),
      btnCancel:  $a('cancel'),
      btnDelete:  $a('delete'),
    };

    /* ═══════════════════════════════════════════════════
       DATA MODEL
       ═══════════════════════════════════════════════════ */

    const Model = {
      empty: () => ({
        ID: 0, BotID: 0, PosX: 0, PosY: 0,
        GiveQuestID: 0, DialogData: [],
        Function: -1, Static: 0, Emote: '', WorldID: 0,
      }),

      fromRow(row) {
        if (!row) return this.empty();
        return {
          ID:           num(row.ID),
          BotID:        num(row.BotID),
          PosX:         num(row.PosX),
          PosY:         num(row.PosY),
          GiveQuestID:  num(row.GiveQuestID),
          DialogData:   parseDialogData(row.DialogData),
          Function:     num(row.Function, -1),
          Static:       num(row.Static) ? 1 : 0,
          Emote:        row.Emote || '',
          WorldID:      num(row.WorldID),
        };
      },

      toPayload(m) {
        const questId = num(m.GiveQuestID);
        const worldId = num(m.WorldID);
        const dialog  = Array.isArray(m.DialogData) ? m.DialogData : [];
        return {
          BotID:        num(m.BotID),
          PosX:         num(m.PosX),
          PosY:         num(m.PosY),
          GiveQuestID:  questId > 0 ? questId : null,
          DialogData:   dialog.length ? dialog : null,
          Function:     num(m.Function, -1),
          Static:       m.Static ? 1 : 0,
          Emote:        m.Emote || null,
          WorldID:      worldId > 0 ? worldId : null,
        };
      },
    };

    /* ═══════════════════════════════════════════════════
       APPLICATION STATE
       ═══════════════════════════════════════════════════ */

    const state = {
      rows:           [],
      selectedId:     0,
      prevSelectedId: 0,   // for canceling creation
      model:          null,
      snapshot:       null, // saved copy for cancellation
      skinsApi:       '',

      lookups: {
        bots:     new Map(),
        worlds:   new Map(),
        quests:   new Map(),
        botSkins: new Map(),
      },

      forms: { basic: null, dialog: null },
    };

    const dirty = EditorCore.Dirty?.create
      ? EditorCore.Dirty.create({
          root: document.querySelector('.editor-main') || document.body,
          pill: DOM.dirtyPill,
          beforeUnload: true,
        })
      : { markDirty() {}, setClean() {}, isDirty: () => false };

    /* ═══════════════════════════════════════════════════
       UI RENDERING (pure functions, no side effects
       except writing to the DOM)
       ═══════════════════════════════════════════════════ */

    const UI = {
      /** Status line */
      setStatus(html = '', tone = 'muted') {
        if (!DOM.status) return;
        const cls = { ok: 'text-emerald-300', err: 'text-red-300' }[tone] || 'editor-muted-text';
        DOM.status.className = `text-sm ${cls}`;
        DOM.status.innerHTML = html;
      },

      /** Toolbar buttons */
      syncButtons() {
        const hasModel  = !!state.model;
        const isDirty   = dirty.isDirty?.() ?? false;
        const persisted = !!state.selectedId;

        if (DOM.btnSave)   DOM.btnSave.disabled   = !hasModel;
        if (DOM.btnDelete) DOM.btnDelete.disabled  = !persisted;
        if (DOM.btnCancel) {
          const show = hasModel && isDirty;
          DOM.btnCancel.disabled = !show;
          DOM.btnCancel.classList.toggle('hidden', !show);
        }
      },

      /** Title and subtitle */
      syncHeader() {
        if (!state.model) {
          if (DOM.title)    DOM.title.textContent    = 'Select an NPC';
          if (DOM.subtitle) DOM.subtitle.textContent = 'or create a new one';
          return;
        }
        const m = state.model;
        const botName = lookupLabel(state.lookups.bots, m.BotID, `Bot #${m.BotID || '—'}`);
        const world   = lookupLabel(state.lookups.worlds, m.WorldID, '—');

        if (DOM.title)    DOM.title.textContent    = botName || `NPC #${state.selectedId || 'new'}`;
        if (DOM.subtitle) DOM.subtitle.textContent =
          `ID: ${state.selectedId || 'new'} • World: ${world} • X:${m.PosX} Y:${m.PosY}`;
      },

      /** Skin preview */
      syncSkin() {
        if (!DOM.skinImg || !DOM.skinMeta) return;
        if (!state.model) {
          DOM.skinImg.src = '';
          DOM.skinMeta.textContent = 'No skin selected.';
          return;
        }
        const info = state.lookups.botSkins.get(String(state.model.BotID));
        if (!info || !state.skinsApi) {
          DOM.skinImg.src = '';
          DOM.skinMeta.textContent = 'Skin not loaded';
          return;
        }
        DOM.skinImg.src = EditorCore.utils.renderSkinApiUrl(state.skinsApi, info);
        DOM.skinMeta.textContent = info.name || 'default';
      },

      /** Sidebar list */
      renderList() {
        const rows = state.rows;
        if (DOM.count) DOM.count.textContent = rows.length || '—';
        if (!DOM.list) return;

        if (!rows.length) {
          DOM.list.innerHTML = '<div class="editor-empty-state">No data</div>';
          return;
        }

        const q = String(DOM.search?.value || '').trim().toLowerCase();
        const filtered = q ? rows.filter((r) => this._matchRow(r, q)) : rows;

        if (!filtered.length) {
          DOM.list.innerHTML = '<div class="editor-empty-state">Nothing found</div>';
          return;
        }

        DOM.list.innerHTML = `<div class="editor-list">${
          filtered.map((r) => this._rowHtml(r)).join('')
        }</div>`;
      },

      /** Full refresh of all dependent blocks */
      refresh() {
        this.renderList();
        this.syncHeader();
        this.syncSkin();
        this.syncButtons();
      },

      /* ── Private helpers ── */

      _matchRow(row, q) {
        if (/^\d+$/.test(q)) {
          return String(row.ID).includes(q) || String(row.BotID).includes(q);
        }
        const bot   = (state.lookups.bots.get(String(row.BotID))   || '').toLowerCase();
        const world = (state.lookups.worlds.get(String(row.WorldID)) || '').toLowerCase();
        return bot.includes(q) || world.includes(q);
      },

      _rowHtml(row) {
        const active  = num(row.ID) === num(state.selectedId);
        const bot     = lookupLabel(state.lookups.bots,   row.BotID,       `Bot #${row.BotID || '—'}`);
        const world   = lookupLabel(state.lookups.worlds, row.WorldID,     '—');
        const quest   = lookupLabel(state.lookups.quests, row.GiveQuestID, '—');
        const skin    = this._skinThumb(row.BotID);
        const ring    = active ? 'ring-2 ring-indigo-500/40' : '';

        return `
          <button type="button"
                  class="w-full text-left editor-row ${ring}"
                  data-id="${row.ID}">
            <div class="flex items-center gap-3">
              ${skin}
              <div class="min-w-0">
                <div class="font-semibold truncate">${bot}</div>
                <div class="text-xs editor-muted-text truncate">
                  ID: ${row.ID} • World: ${world} • Quest: ${quest}
                </div>
              </div>
            </div>
          </button>`;
      },

      _skinThumb(botId) {
        const info = state.lookups.botSkins.get(String(botId));
        if (info && state.skinsApi) {
          const url = EditorCore.utils.renderSkinApiUrl(state.skinsApi, info);
          return `<img class="w-9 h-9 rounded-full border border-light object-cover"
                       src="${url}" alt="skin" loading="lazy" />`;
        }
        return `<div class="w-9 h-9 rounded-full border border-light bg-light
                     flex items-center justify-center text-[10px] text-slate-300">—</div>`;
      },
    };

    /* ═══════════════════════════════════════════════════
       FORMS
       ═══════════════════════════════════════════════════ */

    const Forms = {
      clear() {
        DOM.formBasic.innerHTML  = '<div class="editor-muted-text">Select a record on the left</div>';
        DOM.formDialog.innerHTML = '<div class="editor-muted-text">Select a record on the left</div>';
        state.forms.basic  = null;
        state.forms.dialog = null;
      },

      mount() {
        if (!state.model) { this.clear(); return; }

        this._mountBasic();
        this._mountDialog();
        UI.syncSkin();
      },

      _onDirty() {
        dirty.markDirty();
        UI.syncButtons();
      },

      _mountBasic() {
        const onChange = (data, meta) => {
          state.model = data;
          this._onDirty();
          if (meta?.path === 'BotID') UI.syncSkin();
        };

        if (state.forms.basic) {
          state.forms.basic.setData(state.model);
        } else {
          state.forms.basic = EditorCore.FormRuntime.mount(DOM.formBasic, {
            fields: BASIC_FIELDS,
            data: state.model,
            fieldOptions: fieldRenderOptions,
            onChange,
          });
        }
      },

      _mountDialog() {
        const DE = EditorCore.DialogEditor;
        if (!DE) return;

        const speakerOptions = DE.buildSpeakerOptions(
          state.lookups.bots, DIALOG_EXTRA_SPEAKERS,
        );

        const dialogData = { DialogData: state.model.DialogData || [] };

        const applyConstraints = (data, meta) => {
          const candidates = DE.buildSpeakerCandidates(
            state.lookups.bots, DIALOG_EXTRA_SPEAKERS,
          );
          DE.applyConstraints({
            root: DOM.formDialog, data, meta,
            sideOptions: DIALOG_SIDE_OPTIONS,
            speakerCandidates: candidates,
          });
        };

        const onChange = (data, meta) => {
          state.model.DialogData = Array.isArray(data?.DialogData) ? data.DialogData : [];
          applyConstraints(data, meta);
          requestAnimationFrame(() => applyConstraints(data, meta));
          this._onDirty();
        };

        if (state.forms.dialog) {
          state.forms.dialog.setData(dialogData);
          applyConstraints(state.forms.dialog.getData());
        } else {
          state.forms.dialog = DE.mount(DOM.formDialog, {
            data: dialogData,
            fieldOptions: fieldRenderOptions,
            sideOptions: DIALOG_SIDE_OPTIONS,
            extraSpeakers: DIALOG_EXTRA_SPEAKERS,
            speakerOptions,
            onChange,
          });
        }
      },
    };

    /* ═══════════════════════════════════════════════════
       ACTIONS
       ═══════════════════════════════════════════════════ */

    const Actions = {
      select(row) {
        state.selectedId = row ? num(row.ID) : 0;
        state.model      = row ? Model.fromRow(row) : null;
        state.snapshot    = clone(state.model);
        dirty.setClean();
        Forms.mount();
        UI.refresh();
      },

      createNew() {
        state.prevSelectedId = num(state.selectedId);
        state.selectedId = 0;
        state.model      = Model.empty();
        state.snapshot   = null;
        dirty.setClean();
        Forms.mount();
        UI.refresh();
      },

      cancelChanges() {
        if (!state.model || !dirty.isDirty?.()) return;

        // Cancel new record creation
        if (!state.selectedId) {
          const fallback = state.prevSelectedId
            ? state.rows.find((r) => num(r.ID) === state.prevSelectedId)
            : null;
          this.select(fallback || null);
          UI.setStatus('Creation canceled.', 'ok');
          return;
        }

        // Cancel editing
        state.model = clone(state.snapshot);
        dirty.setClean();
        Forms.mount();
        UI.refresh();
        UI.setStatus('Changes canceled.', 'ok');
      },

      async save() {
        if (!state.model) return;
        UI.setStatus('Saving…');
        try {
          const payload = Model.toPayload(state.model);

          if (state.selectedId) {
            await EditorCore.DBCrud.update(TABLE, state.selectedId, payload);
            UI.setStatus('Saved.', 'ok');
            EditorCore.UI.toast('Saved', 'success');
          } else {
            const res = await EditorCore.DBCrud.create(TABLE, payload);
            state.selectedId     = num(res.id);
            state.prevSelectedId = 0;
            UI.setStatus('Created.', 'ok');
            EditorCore.UI.toast('Created', 'success');
          }

          dirty.setClean();
          await this.loadList();
        } catch (err) {
          this._handleError(err, 'Save error');
        }
      },

      async remove() {
        if (!state.selectedId || !confirm('Delete record?')) return;
        UI.setStatus('Deleting…');
        try {
          await EditorCore.DBCrud.remove(TABLE, state.selectedId);
          EditorCore.UI.toast('Deleted', 'success');
          UI.setStatus('Deleted.', 'ok');
          this.select(null);
          await this.loadList();
        } catch (err) {
          this._handleError(err, 'Delete error');
        }
      },

      async loadList() {
        UI.setStatus('Loading…');
        try {
          const search = DOM.search?.value?.trim() || '';
          const res    = await EditorCore.DBCrud.list(TABLE, { search, limit: 5000, offset: 0 });
          state.rows   = Array.isArray(res.rows) ? res.rows : [];

          UI.setStatus(state.rows.length ? '' : 'List is empty.', 'muted');
          UI.renderList();

          // Restore selection
          if (state.selectedId) {
            const found = state.rows.find((r) => num(r.ID) === state.selectedId);
            if (found) this.select(found);
          } else if (!state.model && state.rows.length) {
            this.select(state.rows[0]);
          }
        } catch (err) {
          this._handleError(err, 'Load error');
        }
      },

      _handleError(err, fallback) {
        const msg = err?.message || fallback;
        UI.setStatus(msg, 'err');
        EditorCore.UI.toast(msg, 'error');
      },
    };

    /* ═══════════════════════════════════════════════════
       EVENT BINDING
       ═══════════════════════════════════════════════════ */

    // List click
    DOM.list?.addEventListener('click', (e) => {
      const btn = e.target?.closest('[data-id]');
      if (!btn) return;
      const row = state.rows.find((r) => num(r.ID) === num(btn.dataset.id));
      if (row) Actions.select(row);
    });

    // Buttons
    DOM.btnRefresh?.addEventListener('click', () => Actions.loadList());
    DOM.btnNew?.addEventListener('click',     () => Actions.createNew());
    DOM.btnSave?.addEventListener('click',    () => Actions.save());
    DOM.btnCancel?.addEventListener('click',  () => Actions.cancelChanges());
    DOM.btnDelete?.addEventListener('click',  () => Actions.remove());

    // Debounced search
    if (DOM.search) {
      DOM.search.addEventListener(
        'input',
        EditorCore.utils.debounce(() => Actions.loadList(), 250),
      );
    }

    // Tabs
    EditorCore.UI.mountTabs(DOM.tabRoot, {
      tabs:   TAB_DEFS,
      active: 'basic',
      onChange(id) {
        DOM.tabBasic?.classList.toggle('hidden',  id !== 'basic');
        DOM.tabDialog?.classList.toggle('hidden', id !== 'dialog');
      },
    });

    /* ═══════════════════════════════════════════════════
       INITIALIZATION
       ═══════════════════════════════════════════════════ */

    async function loadLookups() {
      const fetchMap = async (src) => {
        try {
          const res = await EditorCore.DB.list(src, { limit: 5000, offset: 0 });
          const map = new Map();
          if (res?.ok && Array.isArray(res.items)) {
            for (const it of res.items) map.set(String(it.value), String(it.label || ''));
          }
          return map;
        } catch { return new Map(); }
      };

      const [bots, worlds, quests, botSkins, skinsApi] = await Promise.all([
        fetchMap('bots'),
        fetchMap('worlds'),
        fetchMap('quests'),
        EditorCore.utils.getBotSkinsMap(),
        EditorCore.utils.getSkinsApi(),
      ]);

      Object.assign(state.lookups, { bots, worlds, quests, botSkins });
      state.skinsApi = skinsApi;
    }

    (async () => {
      await loadLookups();
      await Actions.loadList();
      UI.syncHeader();
      UI.syncSkin();
    })();
  </script>
</body>
</html>
