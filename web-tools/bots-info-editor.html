<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Боты — tw_bots_info</title>

  <link rel="stylesheet" href="editor-core/editor-theme.css" />
  <link rel="stylesheet" href="editor-core/editor-template.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script src="editor-core/tailwind-theme.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

  <style>
    body[data-editor="bots_info"]{ --editor-accent:#f97316; }
    .skin-preview-frame{
      background: var(--editor-surface);
      border: 1px solid var(--editor-border);
    }
    .skin-preview-frame img{
      image-rendering: pixelated;
    }
  </style>
</head>

<body class="editor-theme" data-editor="bots_info">
  <div class="editor-page">
    <div class="editor-page-header">
      <div class="editor-page-title">
        <i class="fa-solid fa-robot text-accent text-xl"></i>
        <div>
          <h1>Боты</h1>
          <div class="editor-page-sub">Профиль мобов: имя, скин и экипировка.</div>
        </div>
      </div>
      <div class="editor-page-actions">
        <button class="editor-btn editor-btn-secondary" data-editor-role="refresh">
          <i class="fa-solid fa-rotate"></i><span>Обновить</span>
        </button>
        <button class="editor-btn editor-btn-primary" data-editor-role="new">
          <i class="fa-solid fa-plus"></i><span>Новый бот</span>
        </button>
      </div>
    </div>

    <div class="editor-shell editor-shell--docked">
      <aside class="editor-sidebar editor-dock-sidebar">
        <div class="editor-dock-pad">
          <div class="flex items-center justify-between gap-3">
            <div>
              <div class="text-sm font-semibold">Список ботов</div>
              <div class="text-xs editor-muted-text">Всего: <span data-editor-role="count">—</span></div>
            </div>
          </div>

          <div class="mt-3">
            <div class="editor-search">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input data-editor-role="search" type="search" class="w-full editor-input form-input" placeholder="Поиск по ID/имени…" />
            </div>
          </div>

          <div class="mt-4 editor-sidebar-list editor-scroll" style="max-height: 590px" data-editor-role="list"></div>
        </div>
      </aside>

      <section class="editor-main editor-dock-main">
        <div class="editor-dock-pad">
          <div class="editor-sticky-toolbar flex items-start justify-between gap-4">
            <div>
              <div class="text-lg font-semibold" data-editor-role="title">Выберите бота</div>
              <div class="editor-muted-text text-sm mt-1" data-editor-role="subtitle">или создайте нового</div>
            </div>
            <div class="editor-page-actions">
              <span id="dirty-pill" class="editor-dirty-pill hidden">Данные не сохранены</span>
              <button class="editor-btn editor-btn-primary" data-editor-role="save" disabled>
                <i class="fa-solid fa-floppy-disk"></i><span>Сохранить</span>
              </button>
              <button class="editor-btn editor-btn-secondary" data-editor-role="delete" disabled>
                <i class="fa-solid fa-trash"></i><span>Удалить</span>
              </button>
            </div>
          </div>

          <div class="editor-section mt-4">
            <div class="editor-card p-4">
              <div class="flex items-center justify-between gap-3">
                <div>
                  <div class="font-semibold">Профиль бота</div>
                  <div class="editor-muted-text text-sm">Секции разделены на вкладки: основное, скин и экипировка.</div>
                </div>
                <div id="tabRoot"></div>
              </div>

              <div class="mt-4">
                <div id="tab_basic" class="space-y-6">
                  <div class="editor-form-grid-2" id="formBasic"></div>
                </div>

                <div id="tab_skin" class="space-y-6 hidden">
                  <div class="grid gap-4 md:grid-cols-[220px,1fr] items-start">
                    <div class="editor-card p-4 flex flex-col items-center gap-3">
                      <div class="text-xs uppercase tracking-wider editor-muted-text">Preview</div>
                      <div class="skin-preview-frame w-36 h-36 rounded-2xl flex items-center justify-center">
                        <img id="skinPreviewImg" class="w-28 h-28" alt="Skin preview" />
                      </div>
                      <div id="skinPreviewMeta" class="text-xs editor-muted-text text-center">Скин не загружен</div>
                    </div>
                    <div class="editor-form-grid-2" id="formSkin"></div>
                  </div>
                </div>

                <div id="tab_gear" class="space-y-6 hidden">
                  <div class="editor-form-grid-2" id="formGear"></div>
                </div>
              </div>
            </div>
          </div>

          <div class="mt-4" data-editor-role="status"></div>
        </div>
      </section>
    </div>
  </div>

  <script src="editor-core/core.js"></script>
  <script src="editor-core/field-renderer.js"></script>
  <script src="editor-core/form-runtime.js"></script>
  <script src="editor-core/db-map.js"></script>
  <script src="editor-core/db.js"></script>
  <script src="editor-core/db-crud.js"></script>
  <script src="editor-core/ui.js"></script>
  <script src="editor-core/ui-manager.js"></script>
  <script src="editor-core/defaults.js"></script>
  <script src="editor-core/utils.js"></script>
  <script src="editor-core/bootstrap.js"></script>

  <script>
    const { fieldRenderOptions } = EditorCore.bootstrapEditor({ mode: 'event' });

    const DOM = {
      list: document.querySelector('[data-editor-role="list"]'),
      search: document.querySelector('[data-editor-role="search"]'),
      refresh: document.querySelector('[data-editor-role="refresh"]'),
      newBtn: document.querySelector('[data-editor-role="new"]'),
      title: document.querySelector('[data-editor-role="title"]'),
      subtitle: document.querySelector('[data-editor-role="subtitle"]'),
      save: document.querySelector('[data-editor-role="save"]'),
      del: document.querySelector('[data-editor-role="delete"]'),
      status: document.querySelector('[data-editor-role="status"]'),
      count: document.querySelector('[data-editor-role="count"]'),
      tabRoot: document.getElementById('tabRoot'),
      tabBasic: document.getElementById('tab_basic'),
      tabSkin: document.getElementById('tab_skin'),
      tabGear: document.getElementById('tab_gear'),
      formBasic: document.getElementById('formBasic'),
      formSkin: document.getElementById('formSkin'),
      formGear: document.getElementById('formGear'),
      skinPreviewImg: document.getElementById('skinPreviewImg'),
      skinPreviewMeta: document.getElementById('skinPreviewMeta')
    };

    const dirty = EditorCore.Dirty?.create
      ? EditorCore.Dirty.create({
          root: document.querySelector('.editor-main') || document.body,
          pill: document.getElementById('dirty-pill'),
          beforeUnload: true,
        })
      : { markDirty: () => {}, setClean: () => {} };

    const STATE = {
      rows: [],
      selectedId: 0,
      model: null,
      skinsApi: '',
      forms: {
        basic: null,
        skin: null,
        gear: null,
      }
    };

    const BASIC_FIELDS = {
      Name: {
        type: 'text',
        label: 'Имя бота',
        validate: { required: true },
        ui: { placeholder: 'Например: Guardian' }
      }
    };

    const SKIN_FIELDS = {
      'Skin.name': {
        type: 'text',
        label: 'Название скина',
        ui: { placeholder: 'default' }
      },
      'Skin.custom_color': {
        type: 'toggle',
        label: 'Свои цвета'
      },
      'Skin.color_body': {
        type: 'number',
        label: 'Цвет тела',
        ui: { min: 0, step: 1, placeholder: '0' },
        help: 'Используется только при включённой галочке «Свои цвета». '
      },
      'Skin.color_feet': {
        type: 'number',
        label: 'Цвет ног',
        ui: { min: 0, step: 1, placeholder: '0' },
        help: 'Используется только при включённой галочке «Свои цвета». '
      }
    };

    const GEAR_FIELDS = {
      EquippedModules: {
        type: 'text',
        label: 'Модули',
        ui: { placeholder: '90,91,35' },
        help: 'ID модулей через запятую. Оставьте 0, если модулей нет.'
      },
      SlotHammer: {
        type: 'db_select',
        label: 'Молот',
        ui: {
          dbKey: 'item',
          placeholder: '— предмет —',
          searchPlaceholder: 'Поиск предмета…',
          valueType: 'number',
          dbFilter: { key: 'Type', value: 'Equip hammer' }
        }
      },
      SlotGun: {
        type: 'db_select',
        label: 'Пистолет',
        ui: {
          dbKey: 'item',
          placeholder: '— предмет —',
          searchPlaceholder: 'Поиск предмета…',
          valueType: 'number',
          dbFilter: { key: 'Type', value: 'Equip gun' }
        }
      },
      SlotShotgun: {
        type: 'db_select',
        label: 'Дробовик',
        ui: {
          dbKey: 'item',
          placeholder: '— предмет —',
          searchPlaceholder: 'Поиск предмета…',
          valueType: 'number',
          dbFilter: { key: 'Type', value: 'Equip shotgun' }
        }
      },
      SlotGrenade: {
        type: 'db_select',
        label: 'Гранатомёт',
        ui: {
          dbKey: 'item',
          placeholder: '— предмет —',
          searchPlaceholder: 'Поиск предмета…',
          valueType: 'number',
          dbFilter: { key: 'Type', value: 'Equip grenade' }
        }
      },
      SlotRifle: {
        type: 'db_select',
        label: 'Лазер',
        ui: {
          dbKey: 'item',
          placeholder: '— предмет —',
          searchPlaceholder: 'Поиск предмета…',
          valueType: 'number',
          dbFilter: { key: 'Type', value: 'Equip rifle' }
        }
      },
      SlotArmor: {
        type: 'db_select',
        label: 'Броня',
        ui: {
          dbKey: 'item',
          placeholder: '— предмет —',
          searchPlaceholder: 'Поиск предмета…',
          valueType: 'number',
          dbFilter: { key: 'Type', values: ['Equip armor (tank)', 'Equip armor (dps)', 'Equip armor (healer)'] }
        }
      }
    };

    const emptyModel = () => ({
      ID: 0,
      Name: '',
      JsonTeeInfo: '',
      EquippedModules: '0',
      SlotHammer: 0,
      SlotGun: 0,
      SlotShotgun: 0,
      SlotGrenade: 0,
      SlotRifle: 0,
      SlotArmor: 0,
      Skin: {
        name: 'default',
        custom_color: 0,
        color_body: 0,
        color_feet: 0,
      }
    });

    const parseTeeInfo = (raw) => {
      if (!raw) return { name: 'default', custom_color: 0, color_body: 0, color_feet: 0 };
      try {
        const data = typeof raw === 'string' ? JSON.parse(raw) : raw;
        if (!data || typeof data !== 'object') throw new Error('bad');
        const name = data.skin || 'default';
        const custom = Number(data.custom_color ?? data.customColor ?? 0);
        const body = Number(data.color_body ?? data.colorBody ?? 0);
        const feet = Number(data.color_feet ?? data.color_feer ?? data.colorFeet ?? 0);
        return {
          name,
          custom_color: Number.isFinite(custom) && custom ? 1 : 0,
          color_body: Number.isFinite(body) ? body : 0,
          color_feet: Number.isFinite(feet) ? feet : 0,
        };
      } catch {
        return { name: 'default', custom_color: 0, color_body: 0, color_feet: 0 };
      }
    };

    const normalizeSlot = (value) => {
      const num = Number(value || 0);
      if (!Number.isFinite(num) || num <= 0) return null;
      return num;
    };

    const toModel = (row) => ({
      ID: Number(row?.ID || 0),
      Name: row?.Name || '',
      JsonTeeInfo: row?.JsonTeeInfo || '',
      EquippedModules: row?.EquippedModules || '0',
      SlotHammer: row?.SlotHammer ?? 0,
      SlotGun: row?.SlotGun ?? 0,
      SlotShotgun: row?.SlotShotgun ?? 0,
      SlotGrenade: row?.SlotGrenade ?? 0,
      SlotRifle: row?.SlotRifle ?? 0,
      SlotArmor: row?.SlotArmor ?? 0,
      Skin: parseTeeInfo(row?.JsonTeeInfo),
    });

    const toPayload = (model) => {
      const skin = model?.Skin || {};
      const custom = skin.custom_color ? 1 : 0;
      const payloadSkin = {
        skin: String(skin.name || 'default'),
        custom_color: custom,
        color_body: custom ? Number(skin.color_body || 0) : 0,
        color_feet: custom ? Number(skin.color_feet || 0) : 0,
      };
      return {
        Name: String(model?.Name || '').trim() || 'Bot name',
        JsonTeeInfo: JSON.stringify(payloadSkin),
        EquippedModules: String(model?.EquippedModules || '0').trim() || '0',
        SlotHammer: normalizeSlot(model?.SlotHammer),
        SlotGun: normalizeSlot(model?.SlotGun),
        SlotShotgun: normalizeSlot(model?.SlotShotgun),
        SlotGrenade: normalizeSlot(model?.SlotGrenade),
        SlotRifle: normalizeSlot(model?.SlotRifle),
        SlotArmor: normalizeSlot(model?.SlotArmor),
      };
    };

    const setStatus = (html = '', tone = 'muted') => {
      if (!DOM.status) return;
      const cls = tone === 'ok'
        ? 'text-emerald-300'
        : tone === 'err'
          ? 'text-red-300'
          : 'editor-muted-text';
      DOM.status.className = `text-sm ${cls}`;
      DOM.status.innerHTML = html;
    };

    const setButtons = (enabled) => {
      if (DOM.save) DOM.save.disabled = !enabled;
      if (DOM.del) DOM.del.disabled = !enabled || !STATE.selectedId;
    };

    const setHeader = () => {
      if (!DOM.title && !DOM.subtitle) return;
      if (!STATE.model) {
        if (DOM.title) DOM.title.textContent = 'Выберите бота';
        if (DOM.subtitle) DOM.subtitle.textContent = 'или создайте нового';
        return;
      }
      const name = STATE.model?.Name || `Бот #${STATE.selectedId || 'new'}`;
      if (DOM.title) DOM.title.textContent = name;
      if (DOM.subtitle) DOM.subtitle.textContent = `ID: ${STATE.selectedId || 'new'}`;
    };

    const updateSkinControls = () => {
      const custom = !!STATE.model?.Skin?.custom_color;
      const toggleState = custom ? '1' : '0';
      const toggle = DOM.formSkin?.querySelector?.('[data-path="Skin.custom_color"]');
      if (toggle?.closest('.editor-toggle')) {
        toggle.closest('.editor-toggle').setAttribute('data-checked', toggleState);
      }
      DOM.formSkin?.querySelectorAll?.('[data-path="Skin.color_body"], [data-path="Skin.color_feet"]').forEach((el) => {
        el.disabled = !custom;
      });
    };

    const updatePreview = () => {
      if (!DOM.skinPreviewImg || !DOM.skinPreviewMeta) return;
      const skin = STATE.model?.Skin || {};
      const hasApi = !!STATE.skinsApi;
      if (!STATE.model) {
        DOM.skinPreviewImg.src = '';
        DOM.skinPreviewMeta.textContent = 'Скин не выбран.';
        return;
      }
      if (!hasApi) {
        DOM.skinPreviewImg.src = '';
        DOM.skinPreviewMeta.textContent = 'Skins API не настроен. Проверьте настройки.';
        return;
      }
      const url = EditorCore.utils.renderSkinApiUrl(STATE.skinsApi, {
        name: skin.name,
        body: skin.custom_color ? skin.color_body : '',
        foot: skin.custom_color ? skin.color_feet : '',
      });
      DOM.skinPreviewImg.src = url;
      DOM.skinPreviewMeta.textContent = `${skin.name || 'default'} · ${skin.custom_color ? 'custom' : 'default'}`;
    };

    const showEmptyForm = () => {
      const emptyHtml = '<div class="editor-muted-text">Выберите запись слева</div>';
      DOM.formBasic.innerHTML = emptyHtml;
      DOM.formSkin.innerHTML = emptyHtml;
      DOM.formGear.innerHTML = emptyHtml;
    };

    const mountForms = () => {
      if (!STATE.model) {
        showEmptyForm();
        STATE.forms.basic = null;
        STATE.forms.skin = null;
        STATE.forms.gear = null;
        return;
      }

      const onChange = (data, meta) => {
        STATE.model = data;
        dirty.markDirty();
        if (meta?.path?.startsWith('Skin.')) {
          updateSkinControls();
          updatePreview();
        }
      };

      if (!STATE.forms.basic) {
        STATE.forms.basic = EditorCore.FormRuntime.mount(DOM.formBasic, {
          fields: BASIC_FIELDS,
          data: STATE.model,
          fieldOptions: fieldRenderOptions,
          onChange,
        });
      } else {
        STATE.forms.basic.setData(STATE.model);
      }

      if (!STATE.forms.skin) {
        STATE.forms.skin = EditorCore.FormRuntime.mount(DOM.formSkin, {
          fields: SKIN_FIELDS,
          data: STATE.model,
          fieldOptions: fieldRenderOptions,
          onChange,
        });
      } else {
        STATE.forms.skin.setData(STATE.model);
      }

      if (!STATE.forms.gear) {
        STATE.forms.gear = EditorCore.FormRuntime.mount(DOM.formGear, {
          fields: GEAR_FIELDS,
          data: STATE.model,
          fieldOptions: fieldRenderOptions,
          onChange,
        });
      } else {
        STATE.forms.gear.setData(STATE.model);
      }

      updateSkinControls();
      updatePreview();
    };

    const renderList = () => {
      const rows = STATE.rows || [];
      if (DOM.count) DOM.count.textContent = rows.length ? `${rows.length}` : '—';
      if (!DOM.list) return;
      if (!rows.length) {
        DOM.list.innerHTML = '<div class="editor-empty-state">Нет данных</div>';
        return;
      }
      const skinsApi = STATE.skinsApi || '';
      const html = rows.map((row) => {
        const active = Number(row?.ID) === Number(STATE.selectedId);
        const skin = parseTeeInfo(row?.JsonTeeInfo);
        const skinUrl = skinsApi
          ? EditorCore.utils.renderSkinApiUrl(skinsApi, {
              name: skin.name,
              body: skin.custom_color ? skin.color_body : '',
              foot: skin.custom_color ? skin.color_feet : '',
            })
          : '';
        const skinPreview = skinUrl
          ? `<img class="w-9 h-9 rounded-full border border-light object-cover" src="${skinUrl}" alt="skin" loading="lazy" />`
          : `<div class="w-9 h-9 rounded-full border border-light bg-light flex items-center justify-center text-[10px] text-slate-300">—</div>`;
        return `
          <button type="button" class="w-full text-left editor-row ${active ? 'ring-2 ring-indigo-500/40' : ''}" data-id="${row?.ID}">
            <div class="flex items-center gap-3">
              ${skinPreview}
              <div class="min-w-0">
                <div class="font-semibold truncate">${row?.Name || `#${row?.ID}`}</div>
                <div class="text-xs editor-muted-text truncate">ID: ${row?.ID}</div>
              </div>
            </div>
          </button>
        `;
      }).join('');
      DOM.list.innerHTML = `<div class="editor-list">${html}</div>`;
    };

    const selectRow = (row) => {
      if (!row) {
        STATE.selectedId = 0;
        STATE.model = null;
        dirty.setClean();
        mountForms();
        renderList();
        setHeader();
        setButtons(false);
        return;
      }
      STATE.selectedId = Number(row.ID || 0);
      STATE.model = toModel(row);
      dirty.setClean();
      mountForms();
      renderList();
      setHeader();
      setButtons(true);
    };

    const loadList = async () => {
      const search = DOM.search?.value?.trim() || '';
      setStatus('Загрузка списка…');
      try {
        const res = await EditorCore.DBCrud.list('bots_info', { search, limit: 5000, offset: 0 });
        STATE.rows = Array.isArray(res.rows) ? res.rows : [];
        setStatus(STATE.rows.length ? '' : 'Список пуст.', 'muted');
        renderList();
        if (STATE.selectedId) {
          const found = STATE.rows.find(r => Number(r.ID) === Number(STATE.selectedId));
          if (found) selectRow(found);
        } else if (!STATE.model && STATE.rows.length) {
          selectRow(STATE.rows[0]);
        }
      } catch (err) {
        const msg = err?.message || 'Ошибка загрузки';
        setStatus(msg, 'err');
        EditorCore.UI.toast(msg, 'error');
      }
    };

    const createNew = () => {
      STATE.selectedId = 0;
      STATE.model = emptyModel();
      dirty.setClean();
      mountForms();
      renderList();
      setHeader();
      setButtons(true);
    };

    const save = async () => {
      if (!STATE.model) return;
      setStatus('Сохранение…');
      try {
        const payload = toPayload(STATE.model);
        if (STATE.selectedId) {
          await EditorCore.DBCrud.update('bots_info', STATE.selectedId, payload);
          setStatus('Изменения сохранены.', 'ok');
          EditorCore.UI.toast('Сохранено', 'success');
        } else {
          const res = await EditorCore.DBCrud.create('bots_info', payload);
          STATE.selectedId = Number(res.id || 0);
          setStatus('Запись создана.', 'ok');
          EditorCore.UI.toast('Создано', 'success');
        }
        dirty.setClean();
        await loadList();
      } catch (err) {
        const msg = err?.message || 'Ошибка сохранения';
        setStatus(msg, 'err');
        EditorCore.UI.toast(msg, 'error');
      }
    };

    const remove = async () => {
      if (!STATE.selectedId) return;
      if (!confirm('Удалить запись?')) return;
      setStatus('Удаление…');
      try {
        await EditorCore.DBCrud.remove('bots_info', STATE.selectedId);
        EditorCore.UI.toast('Удалено', 'success');
        setStatus('Удалено.', 'ok');
        selectRow(null);
        await loadList();
      } catch (err) {
        const msg = err?.message || 'Ошибка удаления';
        setStatus(msg, 'err');
        EditorCore.UI.toast(msg, 'error');
      }
    };

    const tabs = EditorCore.UI.mountTabs(DOM.tabRoot, {
      tabs: [
        { id: 'basic', title: 'Основное', icon: 'fa-bars-staggered' },
        { id: 'skin', title: 'Скин', icon: 'fa-user-astronaut' },
        { id: 'gear', title: 'Экипировка', icon: 'fa-shield-halved' },
      ],
      active: 'basic',
      onChange: (id) => {
        DOM.tabBasic.classList.toggle('hidden', id !== 'basic');
        DOM.tabSkin.classList.toggle('hidden', id !== 'skin');
        DOM.tabGear.classList.toggle('hidden', id !== 'gear');
      }
    });

    if (tabs?.getActive) {
      const active = tabs.getActive();
      DOM.tabBasic.classList.toggle('hidden', active !== 'basic');
      DOM.tabSkin.classList.toggle('hidden', active !== 'skin');
      DOM.tabGear.classList.toggle('hidden', active !== 'gear');
    }

    DOM.list?.addEventListener('click', (event) => {
      const btn = event.target?.closest?.('[data-id]');
      if (!btn) return;
      const id = Number(btn.getAttribute('data-id') || 0);
      const row = STATE.rows.find(r => Number(r.ID) === id);
      if (row) selectRow(row);
    });

    DOM.refresh?.addEventListener('click', loadList);
    DOM.newBtn?.addEventListener('click', createNew);
    DOM.save?.addEventListener('click', save);
    DOM.del?.addEventListener('click', remove);

    if (DOM.search) {
      DOM.search.addEventListener('input', EditorCore.utils.debounce(loadList, 250));
    }

    const init = async () => {
      STATE.skinsApi = await EditorCore.utils.getSkinsApi();
      loadList();
      setHeader();
    };

    init();
  </script>
